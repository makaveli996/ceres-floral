# Optional fragment for global WebP delivery (ps_webp module).
# Include this file at the top of the shop .htaccess (after RewriteEngine On):
#   IncludeOptional /path/to/prestashop/modules/ps_webp/config/htaccess-webp.conf
# When the browser sends Accept: image/webp, image requests under img/ or modules/*/img|images/
# are served as WebP by modules/ps_webp/webp.php.
RewriteCond %{HTTP:Accept} image/webp
RewriteCond %{REQUEST_URI} \.(jpe?g|png|gif)$ [NC]
RewriteCond %{REQUEST_URI} ^/(img/|modules/.+/(img|images)/) [NC]
RewriteRule ^(img/|modules/).+\.(jpe?g|png|gif)$ %{ENV:REWRITEBASE}modules/ps_webp/webp.php [L]
